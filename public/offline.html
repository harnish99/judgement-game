<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#EAB308" />
  <title>Judgement — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background-color: #111827;
      color: #F9FAFB;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #EAB308;
      letter-spacing: 0.025em;
    }

    p {
      font-size: 0.9375rem;
      color: #9CA3AF;
      line-height: 1.6;
      max-width: 22rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: 9999px;
      padding: 0.375rem 1rem;
      font-size: 0.8125rem;
      color: #6B7280;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #EF4444;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    .retry {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #EAB308;
      color: #111827;
      font-weight: 700;
      font-size: 0.9375rem;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .retry:hover  { background: #FBBF24; }
    .retry:active { background: #D97706; }
  </style>
</head>
<body>
  <div class="icon">🃏</div>
  <h1>Judgement</h1>
  <div class="badge">
    <span class="dot"></span>
    You are offline
  </div>
  <p>
    No internet connection detected.<br />
    Connect to Wi-Fi or mobile data, then try again.
  </p>
  <button class="retry" onclick="location.reload()">Try Again</button>
</body>
</html>
